<!<!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Portfolio Form</title>
    </head>

    <body>
        <h1>Portfolio Form</h1>
        <form>
            <fieldset>
                <h3>Contact Me</h3>
                First Name:
                <input type="text" required>
                <br><br>
                Last Name:
                <input type="text" required>
                <br><br>
                Email:
                <input type="email" required>
                <br><br>
                Gender:
                <input type="radio" name="gender" value="male"> Male
                <input type="radio" name="gender" value="female"> Female
                <br><br>
                <fieldset>
                    <br>
                    <fieldset>
                        <h3>Services</h3>

                        <input type="checkbox"> Web Development
                        <br>

                        <input type="checkbox">
                        <AI>
                            <br>
                            <input type="checkbox"> Backend
                    </fieldset>

                    <br>
                    <fieldset>
                        <h3>Reason of Contact </h3>
                        <input type="radio" name="reason" value="job"> Job
                        <br>
                        <input type="radio" name="reason" value="project"> Project
                        <br>
                        <input type="radio" name="reason" value="thesis"> Thesis
                    </fieldset>
                    <br>
                    <fieldset>
                        <h3>Book Slot</h3>
                        Date:
                        <input type="date">
                    </fieldset>
                    <br>
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
        </form>
    </body>

    </html>
