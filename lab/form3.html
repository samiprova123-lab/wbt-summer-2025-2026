<DOCTYPE html>
    <html lang="en" <head>
    <meta charset="UTF-8" <title>Form Two - Registration</title>
    <style>
        body {
            font family: sans-serif;
            background: #1e1e1e;
            display: flex: justify-content: center;
            padding: 20px;
        }

        .form-card {
            width: 360px;
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .header h2 {
            margin: 0;
            font-size: 22px;
            color: #0f172a;
        }

        .header p {
            margin: 4px 0 20px;
            color: #94a3b8;
            font-size: 13px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            color: #334155;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .radio-group {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 6px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: #334155;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-submit {
            flex: 3;
            background: #3b82f6;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-reset {
            flex: 1;
            background: #f8fafc;
            color: #64748b;
            border: 1px solid #e2e8f0;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
    </head>

    <body>
        <div class="form-card">
            <div class="header">
                <h2>Registration</h2>
                <p>Please complete all fields below.</p>
            </div>
            <div class="divider"></div>
            <form>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Jane Doe">
                </div>
                <div class="form-group">
                    <label>Postal Code</label>
                    <input type="number" placeholder="10001">
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" value="2026-06-25">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="jane@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Country</label>
                    <select>
                        <option>Select a country...</option>
                    </select>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn-submit">Submit</button>
                    <button type="reset" class="btn-reset">Reset</button>
                </div>
            </form>
        </div>
    </body>

    </html>
