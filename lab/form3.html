<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Form Three - Create Account</title>
</head>

<body>
    <h2>Create your account</h2>
    <p>Join us in a couple of steps.</p>
    <form>
        <p>
            <label>Full name</label><br>
            <input type="text" placeholder="Jane Doe">
        </p>
        <p>
            <label>Age</label><br>
            <input type="number" placeholder="28">
        </p>
        <p>
            <label>Date of birth</label><br>
            <input type="date" value="2026-06-25">
        </p>
        <p>
            <label>Email address</label><br>
            <input type="email" placeholder="jane@example.com">
        </p>
        <p>
            <label>Password</label><br>
            <input type="password" placeholder="••••••••">
        </p>
        <p>
            <label>Preferred contact</label><br>
            <input type="radio" name="contact" id="email" checked> <label for="email">Email</label>
            <input type="radio" name="contact" id="phone"> <label for="phone">Phone</label>
            <input type="radio" name="contact" id="sms"> <label for="sms">SMS</label>
        </p>
        <p>
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </p>
    </form>
</body>

</html>
