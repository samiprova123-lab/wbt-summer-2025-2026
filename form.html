<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simplified Donation Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            padding: 30px;
        }

        .form-container {
            max-width: 600px;
            background: #fff;
            margin: 0 auto;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        h2 {
            color: #cc0000;
            border-bottom: 2px solid #eee;
            padding-bottom: 5px;
            margin-top: 20px;
            font-size: 16px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 180px 1fr;
            margin-bottom: 12px;
            align-items: center;
            gap: 10px;
        }

        .form-row label {
            font-weight: bold;
            text-align: right;
            font-size: 13px;
        }

        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .offset-row {
            margin-left: 190px;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .inline-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .button-group {
            text-align: center;
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .btn {
            padding: 8px 20px;
            margin: 0 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-submit {
            background: #cc0000;
            color: white;
        }

        .btn-reset {
            background: #e0e0e0;
            color: #333;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <form action="#" method="post">

            <h2>Donor Information</h2>

            <div class="form-row">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-row">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-row">
                <label for="country">Country *</label>
                <select id="country" name="country" required>
                    <option value="">Select a Country</option>
                    <option value="BD">Bangladesh</option>
                    <option value="US">United States</option>
                </select>
            </div>

            <div class="form-row">
                <label>Donation Amount *</label>
                <div class="inline-group">
                    <label><input type="radio" name="amount" value="50"> $50</label>
                    <label><input type="radio" name="amount" value="100"> $100</label>
                    <label><input type="radio" name="amount" value="other"> Other</label>
                </div>
            </div>

            <div class="form-row">
                <label>How to Contact?</label>
                <div class="inline-group">
                    <label><input type="checkbox" name="contact" value="email"> Email</label>
                    <label><input type="checkbox" name="contact" value="phone"> Phone</label>
                </div>
            </div>

            <h2>Additional Information</h2>

            <div class="offset-row">
                <label><input type="checkbox" name="anonymous"> Anonymous Gift</label>
            </div>

            <div class="form-row" style="align-items: flex-start;">
                <label for="comments">Comments</label>
                <textarea id="comments" name="comments" rows="3"></textarea>
            </div>

            <div class="button-group">
                <input type="reset" value="Reset" class="btn btn-reset">
                <input type="submit" value="Continue" class="btn btn-submit">
            </div>

        </form>
    </div>

</body>

</html>
